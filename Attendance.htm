<!DOCTYPE html>
<html>
<head>
  <title>Data Entry Form</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, button { padding: 10px; margin: 5px 0; width: 250px; }
    label { display: block; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Data Entry Form</h2>

  <label>ID Number:</label>
  <input type="text" id="idNumber" placeholder="Enter ID">

  <label>First Name:</label>
  <input type="text" id="firstName">

  <label>Last Name:</label>
  <input type="text" id="lastName">

  <label>Department:</label>
  <input type="text" id="department">

  <button onclick="submitForm()">Submit</button>

  <script>
    // Lookup table for ID -> user details
    const userData = {
      "1001": { firstName: "Alice", lastName: "Smith", department: "HR" },
      "1002": { firstName: "Bob", lastName: "Johnson", department: "IT" },
      "1003": { firstName: "Charlie", lastName: "Lee", department: "Finance" }
    };

    // Auto-populate fields based on ID
    document.getElementById('idNumber').addEventListener('input', function() {
      const id = this.value.trim();
      const data = userData[id];

      if (data) {
        document.getElementById('firstName').value = data.firstName;
        document.getElementById('lastName').value = data.lastName;
        document.getElementById('department').value = data.department;
      } else {
        // Clear fields if ID not found
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('department').value = '';
      }
    });

    function submitForm() {
      // For demonstration, just show the data
      const id = document.getElementById('idNumber').value;
      const first = document.getElementById('firstName').value;
      const last = document.getElementById('lastName').value;
      const dept = document.getElementById('department').value;

      alert(`Submitting:\nID: ${id}\nFirst Name: ${first}\nLast Name: ${last}\nDepartment: ${dept}`);
    }
  </script>
</body>
</html>
