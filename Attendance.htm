<!DOCTYPE html>
<html>
<head>
  <title>Embedded Auto-Populated Form</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, button { padding: 10px; margin: 5px 0; width: 200px; }
    iframe { border: 1px solid #ccc; border-radius: 5px; width: 640px; height: 600px; margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Data Entry Form</h2>
  <p>Enter your ID number, and the form will auto-fill your info.</p>

  <input type="text" id="idNumber" placeholder="Your ID">
  <button onclick="updateForm()">Load Form</button>

  <!-- Embedded Google Form -->
  <iframe id="formIframe" src="about:blank"></iframe>

  <script>
    // Lookup table for ID → other info
    const userData = {
      "1001": { firstName: "Alice", lastName: "Smith", department: "HR" },
      "1002": { firstName: "Bob", lastName: "Johnson", department: "IT" },
      "1003": { firstName: "Charlie", lastName: "Lee", department: "Finance" }
    };

    function updateForm() {
      const id = document.getElementById('idNumber').value.trim();
      const data = userData[id];

      if (!data) {
        alert("ID not found!");
        return;
      }

      // Encode values for URL
      const userId = encodeURIComponent(id);
      const firstName = encodeURIComponent(data.firstName);
      const lastName = encodeURIComponent(data.lastName);
      const department = encodeURIComponent(data.department);

      // Google Form pre-fill URL
      const formUrl = `https://docs.google.com/forms/d/e/1NalbBmUOuWJ8NfzMXhqFfrVk6wNIjAit53yuOhvhW-s/viewform?usp=pp_url` +
                      `&entry.111111111=${userId}` +
                      `&entry.222222222=${firstName}` +
                      `&entry.333333333=${lastName}` +
                      `&entry.444444444=${department}&embedded=true`;

      // Update iframe source
      document.getElementById('formIframe').src = formUrl;
    }
  </script>
</body>
</html>
